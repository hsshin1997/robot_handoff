# PART pose at insertion (part frame in world): hovering just above the PCB
# center, long axis along world x. Insertion success = B reaches this
# collision-free; no contact simulation. PLACEHOLDER.
T_world_insert:
  - [1.0, 0.0, 0.0, 0.450]
  - [0.0, 1.0, 0.0, -0.350]
  - [0.0, 0.0, 1.0, 0.315] # pcb top 0.2908 + part half-height + hover
  - [0.0, 0.0, 0.0, 1.0]

# Handoff search: part-position grid (min, max, step) in the dual-reach
# region between the arms, and part orientations (roll-pitch-yaw, degrees).
# Grid shifted toward B: with the 200 mm TCP, A's flange sits 0.2 m behind
# the part along its approach — presenting too close to A's base folds the
# arm into self-collision.
# z window sized for B's top grasp: B's flange sits 0.2 m ABOVE the part,
# and (part z + 0.2) must stay well inside B's 0.927 m reach sphere.
handoff_search:
  x: [0.40, 0.65, 0.0625]
  y: [-0.10, 0.10, 0.10]
  z: [0.45, 0.70, 0.0625]
  orientations_rpy_deg: # part orientation R_h candidates at handoff
    - [0, 0, 0]
    - [90, 0, 0]
    - [180, 0, 0]
    - [270, 0, 0]
    - [0, 0, 45]
    - [0, 0, -45]
    - [90, 0, 45]
    - [90, 0, -45]
  joint_limit_margin: 0.09 # rad (~5 deg), doc's m_jl
  ik_restarts: 8
  n_path_waypoints: 4
  singularity_w_percentile: 5.0 # w_min = this percentile of manipulability
                                # over random reachable configs (doc G3)
  approach: # checked approach/retreat segments (doc G4/G6, §5)
    d_pre: 0.040     # pre-present / pre-grasp back-off along the tool axis (m)
    d_retreat: 0.060 # A's retreat after release (m)
    d_app: 0.030     # pre-insert hover above the insert pose (m)
    n_sweep: 3       # interpolated collision checks per segment

# Part self-symmetry (doc §0): rotations (rpy deg, part frame) that map the
# part onto itself; every grasp is expanded by this orbit for free
# feasibility. DEFINE PER PART — and use the symmetry of the PIN PATTERN,
# not the body (a wrong symmetry inserts the part misoriented!).
# The 1x11 right-angle pin header has NO rotational symmetry -> empty.
part_symmetry_rpy_deg: []
# Example for a rotationally symmetric part (radial capacitor about its z):
#part_symmetry_rpy_deg:
